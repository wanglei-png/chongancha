# ============================================
# 宠安查 - Nginx 生产环境配置
# 部署路径：/etc/nginx/conf.d/pet-health.conf
# ============================================

# HTTP 服务（域名备案完成后，可添加 HTTPS）
server {
    listen 80;
    server_name chongjicha.wlstudio.com.cn 116.62.175.15;

    # 字符集
    charset utf-8;

    # 日志配置
    access_log /var/log/nginx/pet-health-access.log main buffer=32k flush=5s;
    error_log /var/log/nginx/pet-health-error.log warn;

    # 客户端请求大小限制（API 请求体）
    client_max_body_size 10m;

    # 后端 API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:8001;

        # 请求头转发
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（如需）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;

        # 缓冲配置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # 后端 OpenAPI 文档（生产环境建议关闭或限制访问）
    location /docs {
        proxy_pass http://127.0.0.1:8001/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 生产环境可添加 IP 白名单限制
        # allow 你的管理IP;
        # deny all;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8001/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 健康检查端点
    location /health {
        proxy_pass http://127.0.0.1:8001/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # 拒绝访问 .env 等敏感文件
    location ~ /\.env {
        deny all;
        return 404;
    }

    location ~ /\.git {
        deny all;
        return 404;
    }

    # 根路径返回 API 信息
    location / {
        return 200 '{"service":"pet-health-assistant","status":"running","version":"1.0.0"}';
        add_header Content-Type application/json;
    }
}
