<!DOCTYPE html>
<html>
<head>
    <title>宠急查 - 优惠券管理</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .header { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .nav { background: white; padding: 16px; border-radius: 12px; margin-bottom: 20px; }
        .nav a { color: #2B7AE8; text-decoration: none; margin-right: 20px; }
        table { width: 100%; background: white; border-radius: 12px; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { color: #666; font-weight: normal; }
        .form-box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input, select { padding: 8px; margin-right: 8px; border: 1px solid #ddd; border-radius: 6px; }
        button { padding: 8px 16px; background: #2B7AE8; color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>优惠券管理</h1>
    </div>
    
    <div class="nav">
        <a href="/admin/dashboard">数据看板</a>
        <a href="/admin/promotions">优惠券管理</a>
    </div>
    
    <div class="form-box">
        <h3>新建优惠券</h3>
        <form method="post" action="/admin/promotions/create">
            <input type="text" name="code" placeholder="兑换码" required>
            <input type="text" name="name" placeholder="活动名称" required>
            <select name="discount_type">
                <option value="free">免费体验</option>
                <option value="fixed">固定减免</option>
                <option value="percent">折扣</option>
            </select>
            <input type="number" name="discount_value" placeholder="优惠值" step="0.01" required>
            <input type="number" name="valid_days" placeholder="有效天数" value="7">
            <input type="number" name="max_uses" placeholder="最大使用次数" value="100">
            <button type="submit">创建</button>
        </form>
    </div>
    
    <table>
        <tr>
            <th>兑换码</th>
            <th>活动名称</th>
            <th>类型</th>
            <th>优惠值</th>
            <th>已使用/上限</th>
            <th>状态</th>
        </tr>
        {% for p in promotions %}
        <tr>
            <td>{{ p.code }}</td>
            <td>{{ p.name }}</td>
            <td>{{ p.discount_type }}</td>
            <td>{{ p.discount_value }}</td>
            <td>{{ p.used_count }}/{{ p.max_uses }}</td>
            <td>{{ '生效' if p.is_active else '失效' }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
